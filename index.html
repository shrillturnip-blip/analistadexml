<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analista de XML | Softshop Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <meta name="description"
        content="Analista premium de configurações XML para sistemas Softshop. Visualize e gerencie seus arquivos com facilidade.">
    <style>
        /* Modern CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Light Mode Base */
            --bg-primary: #ffffff;
            --bg-secondary: #f4f6f9;
            --accent-primary: #7c3aed;
            --accent-secondary: #fbbf24;
            --text-main: #111827;
            --text-muted: #6b7280;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(124, 58, 237, 0.15);
            --card-bg: #ffffff;
            --transition-speed: 0.7s;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.05);
            /* Responsive Utilities */
            --container-pad: clamp(1.25rem, 5vw, 4rem);
        }

        [data-theme="dark"] {
            /* Softer, more inviting Dark Mode */
            --bg-primary: #241a3a;
            --bg-secondary: #2d2245;
            --accent-primary: #c084fc;
            --accent-secondary: #fbbf24;
            --text-main: #f3f4f6;
            --text-muted: #a78bfa;
            --glass-bg: rgba(36, 26, 58, 0.8);
            --glass-border: rgba(192, 132, 252, 0.2);
            --card-bg: rgba(255, 255, 255, 0.04);
            --shadow-soft: 0 20px 50px -15px rgba(0, 0, 0, 0.3);
        }

        /* Fluid Theme Transition */
        * {
            transition: background-color var(--transition-speed) var(--ease),
                border-color var(--transition-speed) var(--ease),
                color var(--transition-speed) var(--ease),
                box-shadow var(--transition-speed) var(--ease),
                backdrop-filter var(--transition-speed) var(--ease);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            background-image:
                radial-gradient(at 0% 0%, rgba(124, 58, 237, 0.15) 0, transparent 40%),
                radial-gradient(at 100% 0%, rgba(251, 191, 36, 0.1) 0, transparent 40%),
                radial-gradient(at 50% 100%, rgba(124, 58, 237, 0.05) 0, transparent 50%);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.8s var(--ease) forwards;
        }

        .fade-out {
            opacity: 0 !important;
            transform: scale(0.95) !important;
            transition: all 0.6s var(--ease) !important;
        }

        /* Elegant Scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 100px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-secondary);
        }

        /* Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
        }

        /* Layout */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Fixed Header Group */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 4px 20px -10px rgba(0, 0, 0, 0.1);
        }

        header.top-header {
            padding: 1.25rem var(--container-pad);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header.top-header h1 {
            font-size: clamp(1.4rem, 4vw, 1.85rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        header.top-header h1 span {
            color: var(--accent-secondary);
        }

        /* Navigation Tab Bar */
        .top-nav {
            display: flex;
            justify-content: center;
            padding: 0 var(--container-pad);
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            gap: 0.5rem;
        }

        .top-nav::-webkit-scrollbar {
            display: none;
        }

        .nav-link {
            display: inline-block;
            padding: 1rem 1.75rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            border-bottom: 3px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            opacity: 0.7;
        }

        .nav-link:hover {
            color: var(--accent-primary);
            opacity: 1;
        }

        .nav-link.active {
            color: var(--accent-secondary);
            border-bottom-color: var(--accent-secondary);
            background: linear-gradient(to bottom, transparent 80%, rgba(251, 191, 36, 0.05));
            opacity: 1;
        }

        /* Main Content */
        main.content {
            flex: 1;
            padding: var(--container-pad);
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .top-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border: 1px solid transparent;
            font-family: inherit;
            box-shadow: var(--shadow-soft);
            font-size: 0.85rem;
        }

        .btn-primary {
            background: var(--accent-secondary);
            color: #1a0a25;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(251, 191, 36, 0.3);
        }

        .btn-theme {
            background: var(--bg-secondary);
            color: var(--accent-secondary);
            padding: 0.75rem;
            border-color: var(--glass-border);
        }

        /* Config Cards */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: clamp(1.5rem, 3vw, 2.5rem);
        }

        .config-card {
            padding: 1.75rem;
            border-radius: 24px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            opacity: 0;
            /* Star hidden for staggered entry */
        }

        .config-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-secondary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            align-items: center;
        }

        .card-key {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-primary);
            letter-spacing: 0.1em;
        }

        .card-value {
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            word-break: break-all;
            color: var(--text-main);
            background: rgba(124, 58, 237, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        /* Empty state / Drop Zone */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            border: 2px dashed var(--glass-border);
            border-radius: 48px;
            background: var(--bg-secondary);
            padding: var(--container-pad);
            text-align: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .empty-state:hover {
            border-color: var(--accent-primary);
            background: rgba(124, 58, 237, 0.03);
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.1);
        }

        .empty-state svg {
            transition: transform var(--transition-speed) var(--ease);
            color: var(--accent-primary);
            opacity: 0.6;
        }

        .empty-state:hover svg {
            transform: translateY(10px);
            opacity: 1;
            color: var(--accent-secondary);
        }

        .empty-state h2 {
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: 900;
            letter-spacing: -0.04em;
            margin-top: 1.5rem;
            color: var(--text-main);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 1rem 2rem;
            border-radius: 100px;
            background: var(--accent-secondary);
            color: #1a0a25;
            font-weight: 800;
            z-index: 2000;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.5s var(--ease);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .btn span {
                display: none;
            }

            /* Hide button text */
            .btn {
                padding: 0.75rem;
            }

            header.top-header h1 span {
                display: none;
            }

            /* Simpler logo */
        }

        @media (max-width: 480px) {
            header.top-header h1 {
                font-size: 1.25rem;
            }

            .nav-link {
                padding: 0.75rem 1.25rem;
                font-size: 0.75rem;
            }
        }

        /* Footer & Version */
        footer.main-footer {
            padding: 2rem var(--container-pad);
            text-align: center;
            border-top: 1px solid var(--glass-border);
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .version-tag {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            opacity: 0.4;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <!-- Persistent Header & Nav Group -->
        <div class="sticky-header">
            <header class="top-header">
                <h1>Analista de <span>XML</span></h1>
                <div class="top-actions">
                    <button id="theme-toggle" class="btn btn-theme" title="Alternar Tema">
                        <!-- Icon SVG remains same -->
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                    <button id="upload-btn" class="btn btn-primary" style="display: none;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        <span>Importar XML</span>
                    </button>
                    <input type="file" id="file-input" accept=".xml" style="display: none;">
                </div>
            </header>
            <nav class="top-nav" id="sidebar-nav"></nav>
        </div>

        <!-- Content -->
        <main class="content">
            <div id="main-view">
                <div class="empty-state" id="drop-zone">
                    <h2>ANALISADOR DE <span>XML</span></h2>
                    <p
                        style="color: var(--text-muted); font-size: clamp(0.9rem, 2vw, 1.15rem); font-weight: 600; margin-top: 1rem;">
                        Processamento técnico de configurações Softshop</p>
                    <div style="margin-top: 3rem; color: var(--accent-secondary); opacity: 0.8;">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                </div>

                <section id="config-display" style="display: none;">
                    <div style="margin-bottom: clamp(2rem, 8vw, 4rem); text-align: center;">
                        <h2 id="current-section-name"
                            style="font-size: clamp(2rem, 10vw, 3.5rem); font-weight: 900; color: var(--accent-primary); letter-spacing: -0.05em; line-height: 1.1;">
                            SEÇÃO</h2>
                        <div id="section-stats"
                            style="color: var(--accent-secondary); font-weight: 800; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; margin-top: 1rem;">
                        </div>
                    </div>
                    <div class="settings-grid" id="settings-grid"></div>
                </section>
            </div>
        </main>

        <footer class="main-footer">
            ShrillTurnip &bull; 2026
        </footer>

        <div class="version-tag">build v2.5.4</div>
    </div>

    <!-- Script -->
    <script>
        class ConfigApp {
            constructor() {
                this.configData = {};
                this.currentSection = null;

                // Dicionário de Labels Manuais - Apenas estas serão exibidas
                this.labels = {
                    'SERVIDOR': 'Endereço do Servidor',
                    'SERVIDOR_PORTA': 'Porta do Servidor',
                    'SERVIDOR_BancoDados': 'Nome do Banco',
                    'SERVIDOR_SENHA': 'Senha',
                    'SERVIDOR_USUARIO': 'Usuário SQL',
                    'HabilitarApiNFCe': 'Habilitar API NFC-e',
                    'VersaoBancoRetaguarda': 'Versão do Banco (Retaguarda)',
                    'DesejaInformarCPF': 'Solicitar CPF do Cliente',
                    'PreVendaNumero': 'Número da Pré-Venda',
                    'VersaoMemoriaFiscal': 'Versão da Memória Fiscal',
                    'HabilitarComanda': 'Habilitar Módulo de Comandas',
                    'HabilitarComandaMobile': 'Habilitar Comanda Mobile',
                    'EmpresaNome': 'Nome da Empresa',
                    'EmpresaFantasia': 'Nome Fantasia',
                    'EmpresaCNPJ': 'CNPJ da Empresa',
                    'ImpressoraCaminho': 'Caminho da Impressora',
                    'ImpressoraModelo': 'Modelo da Impressora',
                    'NFCe_PastaCNPJ': 'Pasta Raiz do CNPJ',
                    'NFCe_PastaBackup': 'Pasta de Backup',
                    'NFCe_Serie': 'Série da NFC-e',
                    'NFCe_CSC': 'Código CSC',
                    'NFCe_Impressora': 'Impressora Padrão',
                    'NFCe_Numero': 'Próximo Cupom',
                    'NFCe_CNPJ': 'CNPJ',
                    'MODULOS_PesquisaNaGrade': 'Grade',
                    'MODULOS_Delivery': 'Delivery',
                    'MODULOS_TEFAPI': 'TEF',
                    'MODULOS_UsarPreVenda': 'Pré-Venda',
                    'Pix_ClientId': 'Client ID',
                    'Pix_ClientSecret': 'Client Secret',
                    'VENDAS_SolicitarSenhaCancelarVenda': 'Senha para Cancelar Venda',
                    'VENDAS_SolicitarSenhaCancelarVendaItem': 'Senha para Cancelar Item',
                    'VENDAS_HabilitarDuplicata': 'Habilitar Duplicata',
                    'VENDAS_HabilitarDesconto': 'Habilitar Desconto',
                    'VENDAS_SolicitarSenhaDesconto': 'Senha para Desconto',
                    'VENDAS_IniciarComCliente': 'Solicitar cliente no início da venda',
                    'NFCe_SolicitarCpfCnpjValor': 'Solicitar CPF/CNPJ a partir de',
                    'MEI_Ativado': 'MEI',
                    'SAT_Ativado': 'SAT',
                    'VENDAS_UsarBalanca': 'Balanca',
                    'Pix_Ativado': 'Pix',
                    'CupomDescontoVendaMais_Ativado': 'Venda Mais',
                    'QueroBonus_Ativado': 'Quero Bônus',
                    'Pix_ImprimirEstorno': 'Imprimir Estorno',
                    'Pix_SolicitarSenhaExtrato': 'Senha para Extrato',
                    'Pix_ContaPrincipalInstitutionName': 'Nome da Instituição',
                    'Pix_ContaPrincipalBankName': 'Nome do Banco',
                    'Pix_PortaPinpad': 'Porta Pinpad',
                    'Pix_ImprimirPagamento': 'Imprimir Pagamento',
                    'Pix_SolicitarSenhaTelaEstorno': 'Senha para Tela de Estorno',
                    'Pix_AmbienteTestes': 'Ambiente de Testes',
                    'Pix_ImprimirTransferencia': 'Imprimir Transferência',
                    'Pix_ContaPrincipalId': 'ID da Conta Principal',
                    'Pix_ExibirTelaPagamento': 'Exibir Tela de Pagamento',
                    'Pix_SolicitarSenhaTransferencia': 'Senha para Transferência',
                };

                this.elements = {
                    dropZone: document.getElementById('drop-zone'),
                    fileInput: document.getElementById('file-input'),
                    uploadBtn: document.getElementById('upload-btn'),
                    sidebarNav: document.getElementById('sidebar-nav'),
                    configDisplay: document.getElementById('config-display'),
                    settingsGrid: document.getElementById('settings-grid'),
                    sectionName: document.getElementById('current-section-name'),
                    sectionStats: document.getElementById('section-stats'),
                    themeToggle: document.getElementById('theme-toggle')
                };
                this.init();
            }

            init() {
                const t = localStorage.getItem('theme') || 'light';
                document.documentElement.setAttribute('data-theme', t);
                this.updateIcon(t);
                this.elements.themeToggle.onclick = () => this.toggleTheme();
                this.elements.uploadBtn.onclick = () => this.elements.fileInput.click();
                this.elements.fileInput.onchange = (e) => this.handleFile(e);
                this.elements.dropZone.onclick = () => this.elements.fileInput.click();
                this.elements.dropZone.ondragover = (e) => { e.preventDefault(); this.elements.dropZone.style.borderColor = 'var(--accent-secondary)'; };
                this.elements.dropZone.ondragleave = () => { this.elements.dropZone.style.borderColor = 'var(--glass-border)'; };
                this.elements.dropZone.ondrop = (e) => { e.preventDefault(); if (e.dataTransfer.files[0]) this.read(e.dataTransfer.files[0]); };
            }

            toggleTheme() {
                const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
                this.updateIcon(next);
            }

            updateIcon(t) {
                this.elements.themeToggle.innerHTML = t === 'dark'
                    ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>'
                    : '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>';
            }

            async read(f) { this.parse(await f.text()); }
            handleFile(e) { if (e.target.files[0]) this.read(e.target.files[0]); }

            parse(xml) {
                const doc = new DOMParser().parseFromString(xml, "text/xml");
                const root = doc.documentElement;
                if (!root || root.tagName !== 'softshop') return alert('XML Inválido.');

                this.configData = {};
                const tagsToModulos = [
                    'MEI_Ativado', 'SAT_Ativado', 'MODULOS_UsarPreVenda', 'VENDAS_UsarBalanca',
                    'MODULOS_PesquisaNaGrade', 'MODULOS_Delivery', 'Pix_Ativado',
                    'QueroBonus_Ativado', 'CupomDescontoVendaMais_Ativado'
                ];
                const primaryTabs = ['Servidor', 'Modulos', 'Vendas', 'NFCe', 'PIX'];

                for (let s of root.children) {
                    let groupName = s.tagName;
                    const upGroup = groupName.toUpperCase();
                    if (upGroup === 'SERVIDOR') groupName = 'Servidor';
                    else if (upGroup === 'MODULOS') groupName = 'Modulos';
                    else if (upGroup === 'VENDAS') groupName = 'Vendas';
                    else if (upGroup === 'NFCE') groupName = 'NFCe';
                    else if (upGroup === 'PIX') groupName = 'PIX';

                    for (let c of s.children) {
                        const tag = c.tagName;
                        if (this.labels[tag]) {
                            let targetTab = groupName;
                            if (tagsToModulos.includes(tag)) targetTab = 'Modulos';
                            if (tag.toUpperCase() === 'SERVIDOR') targetTab = 'Servidor';

                            if (primaryTabs.includes(targetTab)) {
                                if (!this.configData[targetTab]) this.configData[targetTab] = {};
                                this.configData[targetTab][tag] = c.textContent.trim();
                            }
                        }
                    }
                }

                Object.keys(this.configData).forEach(key => {
                    if (Object.keys(this.configData[key]).length === 0) delete this.configData[key];
                });

                // Transição Charmosa
                this.elements.dropZone.classList.add('fade-out');

                setTimeout(() => {
                    this.elements.dropZone.style.display = 'none';
                    this.elements.configDisplay.style.display = 'block';
                    this.elements.configDisplay.classList.add('animate-in');
                    this.elements.uploadBtn.style.display = 'flex';
                    this.renderMenu();

                    const order = ['Servidor', 'Modulos', 'Vendas', 'NFCe', 'PIX'];
                    const first = order.find(o => this.configData[o]) || Object.keys(this.configData)[0];
                    if (first) this.select(first);
                }, 600);
            }

            renderMenu() {
                this.elements.sidebarNav.innerHTML = '';
                const order = ['Servidor', 'Modulos', 'Vendas', 'NFCe', 'PIX'];
                const sections = Object.keys(this.configData).sort((a, b) => {
                    let idxA = order.indexOf(a);
                    let idxB = order.indexOf(b);
                    if (idxA === -1) idxA = 99;
                    if (idxB === -1) idxB = 99;
                    return idxA - idxB;
                });

                sections.forEach(s => {
                    const a = document.createElement('a'); a.className = `nav-link ${s === this.currentSection ? 'active' : ''}`;
                    a.textContent = s; a.onclick = (e) => { e.preventDefault(); this.select(s); };
                    this.elements.sidebarNav.appendChild(a);
                });
            }

            select(s) {
                this.currentSection = s;
                this.elements.sectionName.textContent = s;
                document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.textContent === s));
                this.draw();
            }

            getFriendlyLabel(key) {
                return this.labels[key] || key;
            }

            draw() {
                this.elements.settingsGrid.innerHTML = '';
                if (!this.configData[this.currentSection]) return;

                let items = Object.entries(this.configData[this.currentSection]);

                if (this.currentSection === 'Modulos') {
                    const moduloOrder = [
                        'MEI_Ativado', 'SAT_Ativado', 'MODULOS_UsarPreVenda', 'VENDAS_UsarBalanca',
                        'MODULOS_PesquisaNaGrade', 'MODULOS_Delivery', 'Pix_Ativado',
                        'QueroBonus_Ativado', 'CupomDescontoVendaMais_Ativado'
                    ];
                    items.sort((a, b) => {
                        let idxA = moduloOrder.indexOf(a[0]);
                        let idxB = moduloOrder.indexOf(b[0]);
                        if (idxA === -1) idxA = 99;
                        if (idxB === -1) idxB = 99;
                        return idxA - idxB;
                    });
                }

                this.elements.sectionStats.textContent = '';
                items.forEach(([k, v], index) => {
                    let displayValue = v || '[Vazio]';
                    if (v && v.toLowerCase() === 'true') displayValue = 'Sim';
                    if (v && v.toLowerCase() === 'false') displayValue = 'Não';

                    const div = document.createElement('div');
                    div.className = 'config-card';
                    // Efeito Cascata Elegante
                    div.style.animation = `fadeInUp 0.8s var(--ease) forwards`;
                    div.style.animationDelay = `${index * 0.08}s`;

                    div.innerHTML = `<div class="card-header"><span class="card-key">${this.getFriendlyLabel(k)}</span></div><div class="card-value">${displayValue}</div>`;
                    div.onclick = () => this.copy(v);
                    this.elements.settingsGrid.appendChild(div);
                });
            }

            type(v) {
                if (v && (v.toLowerCase() === 'true' || v.toLowerCase() === 'false')) return v.toLowerCase();
                return (v && !isNaN(v) && v.trim() !== '') ? 'numeric' : 'text';
            }

            async copy(v) {
                if (!v) return;
                await navigator.clipboard.writeText(v);
                const t = document.createElement('div');
                t.className = 'toast show';
                t.textContent = 'Copiado para área de transferência';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2500);
            }
        }
        new ConfigApp();
    </script>
</body>

</html>
